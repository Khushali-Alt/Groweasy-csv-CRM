version: "3.9"
services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - CORS_ORIGIN=http://localhost:3000
      - PORT=5000
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5000
    depends_on:
      - server
    restart: unless-stopped
